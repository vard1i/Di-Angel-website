<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiitos | Di-Angel</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #020617, #1e3a8a, #ffffff);
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(18px);
      padding: 45px;
      border-radius: 30px;
      max-width: 600px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    }

    img {
      width: 130px;
      border-radius: 18px;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #e5e7eb;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 25px;
      border-radius: 16px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="logo.png" alt="Di-Angel logo">
    <h1>Kiitos yhteydenotosta!</h1>
    <p>
      Viestisi on vastaanotettu. Otamme sinuun yhteyttä mahdollisimman pian.
    </p>
    <a href="/">Takaisin etusivulle</a>
  </div>
</body>
</html>
